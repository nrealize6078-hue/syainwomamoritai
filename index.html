<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>社員を守りたい社長はリアライズクラブに入りなさい</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;color:#eee;padding:20px;}
.container{text-align:center;max-width:500px;}
h1{font-size:22px;margin-bottom:12px;color:#c8a96e;line-height:1.4;}
p{font-size:14px;margin-bottom:32px;color:#aaa;line-height:1.6;}
.btn{display:block;width:100%;padding:18px;margin-bottom:12px;background:#c8a96e;color:#fff;text-decoration:none;border-radius:8px;font-size:16px;font-weight:bold;transition:all 0.3s;}
.btn:hover{background:#b8954e;transform:translateY(-2px);}
.btn.alt{background:#444;color:#ddd;}
.btn.alt:hover{background:#555;}
.note{font-size:11px;color:#666;margin-top:24px;line-height:1.5;}
</style>
</head>
<body>
<div class="container">
<h1>社員を守りたい社長は<br>リアライズクラブに入りなさい</h1>
<p>あなたの端末に最適化されたバージョンを自動で選択します</p>
<a href="mobile.html" class="btn" id="recommended">📱 スマホ版を開く</a>
<a href="pc.html" class="btn alt" id="alt">💻 PC版を開く</a>
<p class="note">※音声読み上げ機能は端末の消音モードがOFFの場合のみ動作します<br>iPhone本体の消音モード（横のスイッチ）をご確認ください</p>
</div>
<script>
var isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||window.innerWidth<768;
if(!isMobile){
  var r=document.getElementById('recommended');
  var a=document.getElementById('alt');
  r.innerHTML='💻 PC版を開く';r.href='pc.html';
  a.innerHTML='📱 スマホ版を開く';a.href='mobile.html';
}
</script>
</body>
</html>
